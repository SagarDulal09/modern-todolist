<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Modern Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 transition-colors duration-300">

    <div id="auth-container" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <h1 class="text-3xl font-bold text-center text-indigo-600 mb-8">TaskFlow</h1>
            
            <div id="login-screen">
                <form id="login-form" class="space-y-4">
                    <input type="text" id="login-id" placeholder="Email or Phone" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <input type="password" id="login-pass" placeholder="Password" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">Login</button>
                </form>
                <div class="mt-6 flex flex-col items-center gap-4">
                    <div id="g_id_onload" data-client_id="719440937863-03c88m70a8o4q60gegqt9ungil7i3uhd.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                    <div class="g_id_signin" data-type="standard"></div>
                    <button onclick="toggleAuth(true)" class="text-sm text-slate-500">New here? Create Account</button>
                </div>
            </div>

            <div id="register-screen" class="hidden">
                <form id="register-form" class="space-y-4">
                    <input type="text" id="reg-user" placeholder="Full Name" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <input type="email" id="reg-email" placeholder="Email" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <input type="text" id="reg-phone" placeholder="Phone" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <input type="password" id="reg-pass" placeholder="Password" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <input type="password" id="reg-confirm" placeholder="Confirm Password" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">Register</button>
                </form>
                <button onclick="toggleAuth(false)" class="w-full mt-4 text-sm text-slate-500 text-center">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden flex h-screen overflow-hidden">
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col p-6 dark:bg-slate-900">
            <div class="flex justify-between items-center mb-10">
                <span class="font-bold text-xl text-indigo-600">TaskFlow</span>
                <button onclick="openListModal()" class="text-indigo-600 hover:scale-110 transition"><i class="fas fa-plus-circle fa-lg"></i></button>
            </div>
            <div id="lists-container" class="flex-1 overflow-y-auto space-y-1">
                </div>
        </aside>

        <main class="flex-1 flex flex-col dark:bg-slate-950">
            <nav class="bg-white border-b border-slate-100 px-8 py-4 flex justify-between items-center dark:bg-slate-900">
                <h2 id="active-list-title" class="font-bold text-xl text-slate-800 dark:text-white">Welcome!</h2>
                <div class="flex items-center gap-6">
                    <button id="theme-toggle" class="text-slate-500 hover:text-indigo-600 transition"><i class="fas fa-moon"></i></button>
                    <button onclick="confirmLogout()" class="text-sm font-bold text-red-500">Logout</button>
                </div>
            </nav>

            <div class="p-8 flex-1 overflow-y-auto">
                <div id="task-input-section" class="hidden mb-8 max-w-2xl mx-auto">
                    <form id="task-form" class="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-sm space-y-4">
                        <input type="text" id="task-input" placeholder="Task description..." class="w-full p-3 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none border border-transparent focus:border-indigo-500" required>
                        <div class="flex gap-4">
                            <input type="date" id="task-date" class="flex-1 p-2 rounded-lg bg-slate-50 dark:bg-slate-800">
                            <input type="time" id="task-time" class="flex-1 p-2 rounded-lg bg-slate-50 dark:bg-slate-800">
                            <button type="submit" class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold shadow-lg shadow-indigo-200">Add</button>
                        </div>
                    </form>
                </div>
                <div id="tasks-container" class="max-w-2xl mx-auto space-y-3">
                    </div>
            </div>
        </main>
    </div>

    <div id="list-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">New Collection</h3>
            <form id="list-modal-form" class="space-y-4">
                <input type="text" id="modal-list-title" placeholder="Title" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800" required>
                <textarea id="modal-list-desc" placeholder="Short description" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="modal-start-date" class="p-2 rounded-lg bg-slate-50 dark:bg-slate-800">
                    <input type="date" id="modal-end-date" class="p-2 rounded-lg bg-slate-50 dark:bg-slate-800">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeListModal()" class="flex-1 p-3 text-slate-500 font-bold">Cancel</button>
                    <button type="submit" class="flex-1 p-3 bg-indigo-600 text-white rounded-xl font-bold">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-2xl p-6 shadow-2xl text-center">
            <div id="confirm-icon" class="text-4xl mb-4">🚪</div>
            <h3 id="confirm-title" class="text-xl font-bold mb-2"></h3>
            <p id="confirm-msg" class="text-slate-500 text-sm mb-6"></p>
            <div class="flex gap-3">
                <button id="confirm-cancel" class="flex-1 p-2 text-slate-500 font-bold">Cancel</button>
                <button id="confirm-proceed" class="flex-1 p-2 bg-indigo-600 text-white rounded-lg font-bold">Confirm</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-[-100px] right-5 transition-all duration-300 z-[400]"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
