<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Pro Task Manager by Sagar Dulal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-slate-50 transition-colors duration-300">

    <div id="preloader">
        <div class="text-3xl font-bold text-indigo-600 mb-2">TaskFlow</div>
        <div class="text-[10px] tracking-[0.2em] text-slate-400 font-bold uppercase mb-6">Designed by Sagar Dulal</div>
        <div class="loader-bar">
            <div id="loader-progress" class="loader-progress"></div>
        </div>
        <div id="loader-perc" class="mt-3 font-bold text-slate-500 text-sm">0%</div>
    </div>

    <div id="auth-container" class="fixed inset-0 bg-white z-[100] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-indigo-600 italic">TF</h1>
                <p class="text-slate-500 font-medium">Manage your workflow professionally.</p>
            </div>
            
            <div id="login-screen">
                <form id="login-form" class="space-y-5">
                    <input type="text" id="login-id" placeholder="Email or Phone" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500" required>
                    <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 rounded-2xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500" required>
                    <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition">Sign In</button>
                </form>
                <div class="mt-8 flex flex-col items-center gap-5">
                    <div id="g_id_onload" 
                         data-client_id="719440937863-03c88m70a8o4q60gegqt9ungil7i3uhd.apps.googleusercontent.com" 
                         data-callback="handleCredentialResponse"></div>
                    <div class="g_id_signin" data-type="standard"></div>
                    <button onclick="toggleAuth(true)" class="text-sm text-slate-500 hover:text-indigo-600 font-bold">Don't have an account? <span class="text-indigo-600">Register</span></button>
                </div>
            </div>

            <div id="register-screen" class="hidden">
                <form id="register-form" class="space-y-4">
                    <input type="text" id="reg-user" placeholder="Full Name" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <input type="email" id="reg-email" placeholder="Email" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <input type="text" id="reg-phone" placeholder="Phone" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <input type="password" id="reg-pass" placeholder="Password" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <input type="password" id="reg-confirm" placeholder="Confirm Password" class="w-full p-3 rounded-xl border border-slate-200" required>
                    <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold">Create Account</button>
                </form>
                <button onclick="toggleAuth(false)" class="w-full mt-4 text-sm text-slate-500 text-center font-bold">Back to Login</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden flex h-screen overflow-hidden">
        
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col p-6 dark:bg-slate-900 transition-all">
            <div class="flex justify-between items-center mb-8">
                <span class="font-black text-2xl text-indigo-600 tracking-tighter italic">TASKFLOW.</span>
                <button onclick="openListModal()" class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-xl hover:scale-110 transition flex items-center justify-center">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <div id="lists-container" class="flex-1 overflow-y-auto pr-2 space-y-2">
                </div>

            <div class="mt-auto pt-6 border-t border-slate-100 dark:border-slate-800">
                <div class="flex justify-center gap-4 mb-4">
                    <a href="https://www.facebook.com/sagardulal09" target="_blank" class="social-icon"><i class="fab fa-facebook"></i></a>
                    <a href="https://www.instagram.com/itsme_sagar9/" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@sagardulal09" target="_blank" class="social-icon"><i class="fab fa-tiktok"></i></a>
                    <a href="https://www.threads.com/@itsme_sagar9" target="_blank" class="social-icon"><i class="fab fa-at"></i></a>
                    <a href="https://www.linkedin.com/in/sagardulal09/" target="_blank" class="social-icon"><i class="fab fa-linkedin"></i></a>
                    <a href="https://x.com/SagarDulal09" target="_blank" class="social-icon"><i class="fab fa-x-twitter"></i></a>
                </div>
                <div class="text-center">
                    <p class="text-[9px] text-slate-400 font-black uppercase tracking-[0.2em] mb-1">Developer: Sagar Dulal</p>
                    <p class="text-[8px] text-slate-300 font-bold">&copy; 2026 Sagar Dulal. All Rights Reserved.</p>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col dark:bg-slate-950">
            <nav class="bg-white/80 backdrop-blur-md border-b border-slate-100 px-8 py-4 flex justify-between items-center dark:bg-slate-900/80">
                <h2 id="active-list-title" class="font-bold text-xl text-slate-800 dark:text-white">Select a Collection</h2>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="w-10 h-10 bg-slate-50 text-slate-500 rounded-xl hover:text-indigo-600 transition dark:bg-slate-800 flex items-center justify-center">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button onclick="confirmLogout()" class="text-sm font-bold text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl transition">Logout</button>
                </div>
            </nav>

            <div class="p-8 flex-1 overflow-y-auto">
                <div id="task-input-section" class="hidden mb-10 max-w-4xl mx-auto">
                    <form id="task-form" class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="md:col-span-2 space-y-2">
                                <label class="text-[10px] font-black text-slate-400 tracking-widest uppercase ml-1">Task Description</label>
                                <input type="text" id="task-input" placeholder="What needs to be done?" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none border border-transparent focus:border-indigo-500 transition" required>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 tracking-widest uppercase ml-1">Initial Status</label>
                                <select id="task-status" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none border border-transparent focus:border-indigo-500 cursor-pointer">
                                    <option value="Not Started">Not Started</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Completed">Completed</option>
                                    <option value="Delayed">Delayed</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 tracking-widest uppercase ml-1">Due Date</label>
                                <input type="date" id="task-date" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none border border-transparent focus:border-indigo-500">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 tracking-widest uppercase ml-1 text-indigo-500">Primary Session</label>
                                <div class="flex gap-2">
                                    <input type="time" id="task-time-start" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl text-xs">
                                    <input type="time" id="task-time-end" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl text-xs">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 tracking-widest uppercase ml-1 text-purple-500">Secondary (Optional)</label>
                                <div class="flex gap-2">
                                    <input type="time" id="task-sec-start" class="w-full p-4 bg-purple-50/30 dark:bg-slate-800 rounded-2xl text-xs">
                                    <input type="time" id="task-sec-end" class="w-full p-4 bg-purple-50/30 dark:bg-slate-800 rounded-2xl text-xs">
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-end pt-4">
                            <button type="submit" class="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-bold shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition">Save Task</button>
                        </div>
                    </form>
                </div>

                <div id="tasks-container" class="max-w-4xl mx-auto space-y-4">
                    </div>
            </div>
        </main>
    </div>

    <div id="list-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 dark:text-white">New Collection</h3>
            <form id="list-modal-form" class="space-y-5">
                <input type="text" id="modal-list-title" placeholder="Collection Title" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800" required>
                <textarea id="modal-list-desc" placeholder="What is this collection about?" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 h-28"></textarea>
                <div class="flex gap-4">
                    <button type="button" onclick="closeListModal()" class="flex-1 p-4 text-slate-400 font-bold hover:bg-slate-50 rounded-2xl transition">Cancel</button>
                    <button type="submit" class="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[300] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 text-center">
            <div id="confirm-icon" class="text-5xl mb-4">🔔</div>
            <h3 id="confirm-title" class="text-2xl font-bold mb-2 dark:text-white">Confirm Action</h3>
            <p id="confirm-msg" class="text-slate-500 mb-8"></p>
            <div class="flex gap-3">
                <button id="confirm-cancel" class="flex-1 p-4 text-slate-400 font-bold">Cancel</button>
                <button id="confirm-proceed" class="flex-1 p-4 bg-indigo-600 text-white rounded-2xl font-bold">Confirm</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-[-100px] right-8 transition-all duration-500 z-[400] bg-slate-800 text-white px-8 py-5 rounded-2xl shadow-2xl font-bold"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
