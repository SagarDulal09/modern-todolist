<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskFlow Pro | Secure Enterprise Node</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --glass: rgba(255, 255, 255, 0.7);
            --bg-light: #f8fafc;
            --bg-dark: #020617;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.5s ease; }
        .dark-mode { background-color: var(--bg-dark); color: white; }
        
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark-mode .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .modern-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            background: white;
            transition: all 0.3s ease;
            outline: none;
        }

        .dark-mode .modern-input {
            background: #0f172a;
            border-color: #1e293b;
            color: white;
        }

        .modern-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        .input-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            color: #64748b;
        }

        .task-card {
            background: white;
            padding: 2rem;
            border-radius: 2.5rem;
            border: 1px solid #f1f5f9;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode .task-card {
            background: #0f172a;
            border-color: #1e293b;
        }

        .task-card:hover { transform: translateY(-5px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }

        .status-pill {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #f1f5f9;
            color: #475569;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.6s ease forwards; }
    </style>
</head>
<body class="overflow-hidden">

    <div id="preloader" class="fixed inset-0 z-[10000] flex flex-col items-center justify-center bg-white dark:bg-slate-950">
        <div class="relative mb-8 text-center">
            <h1 class="text-4xl font-black italic text-indigo-600">TASKFLOW<span class="text-slate-900 dark:text-white">.PRO</span></h1>
            <p id="network-speed" class="mt-4 text-[9px] font-black uppercase tracking-[0.4em] text-slate-400 italic">Syncing with Node...</p>
        </div>
        <div class="w-48 h-1 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
            <div id="loader-progress" class="h-full bg-indigo-600 transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <div id="auth-container" class="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-950 overflow-y-auto">
        <div class="glass-panel w-full max-w-xl p-10 rounded-[3rem] shadow-2xl">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-[1.5rem] bg-indigo-600 text-white text-2xl mb-4">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h2 class="text-2xl font-black dark:text-white">System Authorization</h2>
                <p class="text-xs text-slate-500 mt-2 font-bold uppercase tracking-widest">Nepal / India Identity Node</p>
            </div>

            <div id="login-screen">
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="input-label">Access Key (Email/Phone)</label>
                        <input type="text" id="login-id" class="modern-input" required placeholder="identifier@node.com">
                    </div>
                    <div>
                        <label class="input-label">Secure Passcode</label>
                        <input type="password" id="login-pass" class="modern-input" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Authorize Access</button>
                </form>
                <div class="mt-8 flex flex-col items-center gap-6">
                    <div id="g_id_onload" data-client_id="719440937863-03c88m70a8o4q60gegqt9ungil7i3uhd.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                    <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
                    <button onclick="toggleAuth(true)" class="text-[10px] font-black text-slate-400 hover:text-indigo-600 uppercase tracking-widest">Establish New Profile</button>
                </div>
            </div>

            <div id="register-screen" class="hidden animate-slide-up">
                <form id="register-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="input-label">Full Legal Name</label>
                        <input type="text" id="reg-user" class="modern-input" required>
                    </div>
                    <div>
                        <label class="input-label">Professional Email</label>
                        <input type="email" id="reg-email" class="modern-input" required>
                    </div>
                    <div>
                        <label class="input-label">Phone (+977 / +91)</label>
                        <input type="text" id="reg-phone" class="modern-input" placeholder="98XXXXXXXX" required>
                    </div>
                    <div class="col-span-2">
                        <label class="input-label">Create Secure Password</label>
                        <input type="password" id="reg-pass" class="modern-input" required>
                    </div>
                    <div id="otp-area" class="col-span-2 hidden p-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl border border-indigo-100 dark:border-indigo-800">
                        <label class="input-label text-indigo-600">6-Digit Security Token</label>
                        <div class="flex gap-2">
                            <input type="text" id="reg-otp" maxlength="6" class="flex-1 p-3 rounded-xl border border-indigo-200 text-center font-black tracking-widest">
                            <button type="button" onclick="verifyAndRegister()" class="px-6 bg-indigo-600 text-white rounded-xl font-black text-[10px]">VERIFY</button>
                        </div>
                    </div>
                    <button type="button" id="send-otp-btn" onclick="requestOTP()" class="col-span-2 py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest">Dispatch Token</button>
                </form>
                <button onclick="toggleAuth(false)" class="w-full mt-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Return to Gate</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden flex h-screen">
        <aside class="w-72 glass-panel border-r border-slate-200 dark:border-slate-800 flex flex-col p-8 z-50">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white text-xs">
                    <i class="fas fa-layer-group"></i>
                </div>
                <span class="font-black text-xl tracking-tighter dark:text-white uppercase">TF<span class="text-indigo-600">PRO</span></span>
            </div>
            <nav id="lists-container" class="flex-1 space-y-2 overflow-y-auto custom-scroll">
                </nav>
            <div class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-800">
                <div class="flex justify-center gap-4 text-slate-400 mb-4">
                    <a href="https://facebook.com/sagardulal09" target="_blank" class="hover:text-indigo-600"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://linkedin.com/in/sagardulal09" target="_blank" class="hover:text-indigo-600"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <p class="text-[7px] text-center font-black uppercase tracking-[0.3em] text-slate-300">&copy; 2026 Sagar Dulal</p>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-50 dark:bg-slate-950 overflow-hidden">
            <header class="h-20 glass-panel px-10 flex items-center justify-between border-b border-slate-200 dark:border-slate-800">
                <div>
                    <h2 id="active-list-title" class="text-xl font-black dark:text-white uppercase italic tracking-tight">Accessing Node...</h2>
                </div>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-indigo-600 shadow-sm">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div id="user-avatar" class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-black cursor-pointer" onclick="confirmLogout()">S</div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-8 custom-scroll">
                <section id="task-input-section" class="hidden max-w-5xl mx-auto mb-12">
                    <div class="task-card border-indigo-500/10 shadow-sm">
                        <form id="task-form" class="space-y-6">
                            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                                <div class="lg:col-span-3">
                                    <label class="input-label">Mission Objective</label>
                                    <input type="text" id="task-input" class="modern-input" placeholder="Enter task narrative..." required>
                                </div>
                                <div>
                                    <label class="input-label">Node Status</label>
                                    <select id="task-status" class="modern-input">
                                        <option value="Not Started">Not Started</option>
                                        <option value="In Progress">In Progress</option>
                                        <option value="Completed">Completed</option>
                                        <option value="Delayed">Delayed</option>
                                    </select>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                <div>
                                    <label class="input-label">Start Date</label>
                                    <input type="date" id="task-date" class="modern-input">
                                </div>
                                <div>
                                    <label class="input-label text-red-500">End Deadline</label>
                                    <input type="date" id="task-end-date" class="modern-input border-red-500/20">
                                </div>
                                <div>
                                    <label class="input-label text-indigo-600">Primary Session</label>
                                    <div class="flex gap-2">
                                        <input type="time" id="task-time-start" class="modern-input text-xs p-2">
                                        <input type="time" id="task-time-end" class="modern-input text-xs p-2">
                                    </div>
                                </div>
                                <div>
                                    <label class="input-label text-purple-600">Secondary Session</label>
                                    <div class="flex gap-2">
                                        <input type="time" id="task-sec-start" class="modern-input text-xs p-2">
                                        <input type="time" id="task-sec-end" class="modern-input text-xs p-2">
                                    </div>
                                </div>
                            </div>
                            <div class="flex justify-end">
                                <button type="submit" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Deploy Objective</button>
                            </div>
                        </form>
                    </div>
                </section>

                <div id="tasks-container" class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                    </div>
            </div>
        </main>
    </div>

    <div id="trash-modal" class="hidden fixed inset-0 z-[10000] flex items-center justify-center p-6 bg-slate-950/80 backdrop-blur-md">
        <div class="task-card w-full max-w-lg">
            <h3 class="text-xl font-black dark:text-white mb-6 uppercase text-center">Confirm Archival?</h3>
            <form id="trash-form" class="space-y-4">
                <input type="hidden" id="trash-target-id">
                <div>
                    <label class="input-label">Reason for Relocation</label>
                    <select id="trash-reason" class="modern-input">
                        <option value="Objective Attained">Objective Attained</option>
                        <option value="Timeline Exceeded">Timeline Exceeded</option>
                        <option value="Strategic Pivot">Strategic Pivot</option>
                    </select>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeTrashModal()" class="flex-1 py-4 font-black text-slate-400 text-[10px] uppercase">Abort</button>
                    <button type="submit" class="flex-1 py-4 bg-red-600 text-white rounded-xl font-black text-[10px] uppercase">Archive</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-[-100px] left-1/2 -translate-x-1/2 glass-panel bg-slate-900/95 text-white px-10 py-5 rounded-full shadow-2xl font-black text-[9px] uppercase tracking-widest transition-all duration-700 z-[20000]">
        <span id="toast-text">System Synced</span>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
